name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ─────────────────────────────────────────────
  # Linux — x86_64 glibc binary
  # ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-gnu"

      - name: Build release binary
        run: cargo build --release

      - name: Strip debug symbols
        run: strip target/release/wa

      - name: Compress binary
        run: |
          mkdir -p dist
          tar czf dist/wa-linux-x86_64.tar.gz -C target/release wa

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: wa-linux-x86_64
          path: dist/wa-linux-x86_64.tar.gz

  # ─────────────────────────────────────────────
  # Windows — native MSVC build
  # ─────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-msvc"

      - name: Build release binary
        run: cargo build --release
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Compress binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path target\release\wa.exe -DestinationPath dist\wa-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: wa-windows-x86_64
          path: dist/wa-windows-x86_64.zip

  # ─────────────────────────────────────────────
  # macOS — Intel + Apple Silicon universal-ish
  # (builds both, combines into one archive)
  # ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos"

      - name: Build Intel (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build Apple Silicon (aarch64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Compress binaries
        run: |
          mkdir -p dist
          tar czf dist/wa-macos-x86_64.tar.gz  -C target/x86_64-apple-darwin/release  wa
          tar czf dist/wa-macos-aarch64.tar.gz -C target/aarch64-apple-darwin/release wa

      - name: Upload Intel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wa-macos-x86_64
          path: dist/wa-macos-x86_64.tar.gz

      - name: Upload ARM artifact
        uses: actions/upload-artifact@v6
        with:
          name: wa-macos-aarch64
          path: dist/wa-macos-aarch64.tar.gz

  # ─────────────────────────────────────────────
  # Release — attach all binaries to GitHub release
  # Only runs on tag push (v*)
  # ─────────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          cp artifacts/wa-linux-x86_64/wa-linux-x86_64.tar.gz       release/
          cp artifacts/wa-windows-x86_64/wa-windows-x86_64.zip    release/
          cp artifacts/wa-macos-x86_64/wa-macos-x86_64.tar.gz      release/
          cp artifacts/wa-macos-aarch64/wa-macos-aarch64.tar.gz  release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
